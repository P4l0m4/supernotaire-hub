name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run Vitest
        run: yarn vitest run

  e2e-playwright:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    env:
      NITRO_PRESET: node-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Install Playwright WebKit only
        run: npx playwright install --with-deps webkit
      - name: Build (Nitro node preset)
        run: npx nuxi build --preset node-server
      - name: Start preview server
        run: |
          PORT=3000 HOST=0.0.0.0 node .output/server/index.mjs > /tmp/nitro.log 2>&1 &
          echo $! > /tmp/nitro.pid
          npx wait-on --timeout 120000 http://localhost:3000 || (echo "Nitro logs:" && cat /tmp/nitro.log && exit 1)
          echo "Nitro logs (tail):"
          tail -n 40 /tmp/nitro.log
      - name: Run Playwright (webkit-ios)
        env:
          LOCAL_E2E: "1"
        run: npx playwright test --project=webkit-ios --reporter=line
